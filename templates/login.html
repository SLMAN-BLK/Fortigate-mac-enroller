<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Network Access Portal — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  // Apply saved theme BEFORE paint to avoid flash
  (function() {
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark');
    }
  })();
</script>
<style>
  /* ── LIGHT (default) ── */
  :root {
    --bg:         #f5f5f5;
    --panel:      #ffffff;
    --border:     #e0e0e0;
    --border2:    #d0d0d0;
    --accent:     #cc0000;
    --accent2:    #aa0000;
    --warn:       #cc0000;
    --text:       #1a1a1a;
    --text-dim:   #666666;
    --text-light: #999999;
    --input-bg:   #fafafa;
    --shadow:     rgba(0,0,0,0.06);
  }

  /* ── DARK override ── */
  :root.dark {
    --bg:         #0a0c0f;
    --panel:      #0f1318;
    --border:     #1e2d3d;
    --border2:    #2a3f55;
    --accent:     #cc0000;
    --accent2:    #aa0000;
    --warn:       #ff4444;
    --text:       #c8d8e8;
    --text-dim:   #5a7a8a;
    --text-light: #3a5a6a;
    --input-bg:   rgba(0,0,0,0.3);
    --shadow:     rgba(0,0,0,0.4);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s, color 0.3s;
  }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    position: fixed;
    top: 16px; right: 16px;
    width: 38px; height: 38px;
    background: var(--panel);
    border: 1.5px solid var(--border2);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px var(--shadow);
    z-index: 100;
  }

  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 2px 12px var(--shadow);
  }

  /* Show sun in dark mode, moon in light mode */
  .icon-moon { display: block; }
  .icon-sun  { display: none;  }
  :root.dark .icon-moon { display: none;  }
  :root.dark .icon-sun  { display: block; }

  /* ── CONTAINER ── */
  .container {
    width: 420px;
    padding: 24px;
    animation: fadeIn 0.4s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HEADER ── */
  .badge { text-align: center; margin-bottom: 28px; }

  .badge-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 52px; height: 52px;
    background: var(--accent);
    border-radius: 10px;
    margin-bottom: 16px;
    color: #fff;
    box-shadow: 0 4px 12px rgba(204,0,0,0.3);
  }

  .badge-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }

  .badge-sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .sites { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }

  .site-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    background: var(--input-bg);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  /* ── PANEL ── */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    box-shadow: 0 2px 16px var(--shadow);
    transition: background 0.3s, border-color 0.3s;
  }

  .panel-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── FORM ── */
  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .input-wrap { position: relative; display: flex; align-items: center; }

  .input-icon {
    position: absolute;
    left: 12px;
    color: var(--text-light);
    pointer-events: none;
    transition: color 0.2s;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 11px 12px 11px 40px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.3s, color 0.3s;
  }

  input:focus {
    border-color: var(--accent);
    background: var(--panel);
    box-shadow: 0 0 0 3px rgba(204,0,0,0.1);
  }

  .input-wrap:focus-within .input-icon { color: var(--accent); }

  /* ── ERROR ── */
  .alert-error {
    background: rgba(204,0,0,0.07);
    border: 1px solid rgba(204,0,0,0.25);
    border-left: 3px solid var(--warn);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 18px;
    font-size: 13px;
    color: var(--warn);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── BUTTON ── */
  .btn-submit {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 13px;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    box-shadow: 0 2px 8px rgba(204,0,0,0.3);
  }

  .btn-submit:hover { background: var(--accent2); box-shadow: 0 4px 14px rgba(204,0,0,0.4); }
  .btn-submit:active { transform: scale(0.99); }

  /* ── STATUS BAR ── */
  .status-bar {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-light);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 4px #22c55e;
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-bar span:last-child { margin-left: auto; }
</style>
</head>
<body>

<!-- Theme toggle button -->
<button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">
  <svg class="icon-moon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75 9.75 9.75 0 018.25 6c0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25 9.75 9.75 0 0021 12c0-.338-.017-.672-.048-1l-.2-.998z"/>
  </svg>
  <svg class="icon-sun" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/>
  </svg>
</button>

<div class="container">
  <div class="badge">
    <div class="badge-icon">
      <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
      </svg>
    </div>
    <div class="badge-title">Network Access Portal</div>
    <div class="badge-sub">Multi-Site · lab1.local</div>
    <div class="sites">
      <span class="site-badge">TFC</span>
      <span class="site-badge">DFC</span>
      <span class="site-badge">RMC</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-label">Domain Authentication</div>

    {% if error %}
    <div class="alert-error">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" autocomplete="off">
      <div class="field">
        <label for="username">Domain Username</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
          </svg>
          <input type="text" id="username" name="username" placeholder="username or user@lab1.local" required autofocus/>
        </div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
          </svg>
          <input type="password" id="password" name="password" placeholder="••••••••••••" required/>
        </div>
      </div>
      <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <div class="status-bar">
      <div class="status-dot"></div>
      <span>LDAP failover · 3 DCs</span>
      <span>lab1.local</span>
    </div>
  </div>
</div>

<script>
  function toggleTheme() {
    const html = document.documentElement;
    html.classList.toggle('dark');
    localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
  }
</script>
</body>
</html>
